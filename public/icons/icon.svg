<!-- Save this as public/icons/icon.svg — use it as source for 192 and 512 PNG icons -->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#080808"/>
  <!-- Left half: blue gradient -->
  <rect x="0" y="0" width="256" height="512" fill="url(#blueGrad)"/>
  <!-- Right half: fire gradient -->
  <rect x="256" y="0" width="256" height="512" fill="url(#fireGrad)"/>
  <!-- A left -->
  <text x="90" y="340" font-family="serif" font-weight="900" font-size="280" fill="white" opacity="0.95">A</text>
  <!-- × center -->
  <text x="200" y="300" font-family="serif" font-weight="300" font-size="120" fill="rgba(255,255,255,0.4)">×</text>
  <!-- A right -->
  <text x="280" y="340" font-family="serif" font-weight="900" font-size="280" fill="white" opacity="0.95">A</text>
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#1a6fff" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="fireGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4d1a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a0a05"/>
    </linearGradient>
  </defs>
</svg>
